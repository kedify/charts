{{- if or .Values.optionalResources.all.enabled .Values.optionalResources.scalingGroup.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app-1
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}-app-1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app-1
    spec:
      containers:
        - name: main
          image: ubuntu
          imagePullPolicy: IfNotPresent
          command:
          - sleep
          - inf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-test-keda-metric-1
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-test-keda-metric-1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-test-keda-metric-1
    spec:
      containers:
        - name: main
          image: ubuntu
          imagePullPolicy: IfNotPresent
          command:
          - sleep
          - inf
---
kind: ScaledObject
apiVersion: keda.sh/v1alpha1
metadata:
  name: {{ .Release.Name }}-app-1
  namespace: {{ .Release.Namespace }}
  labels:
    scaling-group: cap-5
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-app-1
  cooldownPeriod: 5
  minReplicaCount: 1
  maxReplicaCount: 10
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 5
  triggers:
  - type: kubernetes-workload
    metadata:
      podSelector: "app={{ .Release.Name }}-test-keda-metric-1"
      value: "1"
---
