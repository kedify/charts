apiVersion: keda.kedify.io/v1alpha1
kind: ScalingGroup
metadata:
  name: {{ .Release.Name }}-max-group
  namespace: {{ .Release.Namespace }}
spec:
  capacity: 5
  selector:
    matchLabels:
      scaling-group: cap-5
{{- end }}
