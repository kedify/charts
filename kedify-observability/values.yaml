optionalResources:
  all:
    enabled: false

  namespaceOverride: ""
  scaledObjectsAndJobsCommon:
    namespaceCount: 2
    namespacePrefix: obs
    minuteMetricsSchedule: "0:2,1:0,2:3,3:2,4:0,5:1,7:2,8:5,9:0"
    # use either this or the minuteMetricsSchedule above, not both (randomMinuteMetricsSchedule will override minuteMetricsSchedule)
    randomMinuteMetricsSchedule: false

  scaledObjects:
    enabled: false
    unpausedPerNamespace: 3
    pausedPerNamespace: 1

  scaledJobs:
    enabled: false
    unpausedPerNamespace: 1
    pausedPerNamespace: 1
    sleepSeconds: 30
  
  clusterTriggerAuthentications:
    enabled: false

  triggerAuthentications:
    enabled: false

  metricPredictor:
    enabled: false

  pra:
    enabled: false

  prp:
    enabled: false
    initialMemoryRequest: 50M
    updateMemoryRequest: 30M
    delay: 30s

  scalingPolicy:
    enabled: false

  scalingGroup:
    enabled: false

dashboards:
  enabled: true

# Subcharts:
#
# ------------------------
# Grafana sub-chart values
# ------------------------
grafana:
  enabled: true
  namespaceOverride: ""
  fullnameOverride: grafana
  replicas: 1
  service:
    type: ClusterIP

  persistence:
    enabled: false

  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Admin
    auth:
      disable_login_form: true
    auth.basic:
      enabled: false

  datasources:
    datasources.yaml:
      apiVersion: 1
      deleteDatasources:
        - name: Prometheus
          orgId: 1
      datasources:
        - name: Prometheus
          uid: prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-server
          isDefault: true
          editable: true
          jsonData:
            timeInterval: 15s
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://loki-gateway
          editable: true
          

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: kedify
          orgId: 1
          folder: Kedify
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kedify

  sidecar:
    dashboards:
      enabled: true



# ---------------------
# Loki sub-chart values
# ---------------------
loki:
  enabled: true
  namespaceOverride: ""
  fullnameOverride: loki
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
    pattern_ingester:
      enabled: true
    ruler:
      enable_api: true
    memcached:
      chunk_cache:
        enabled: false
      results_cache:
        enabled: false
  memcached:
    enabled: false

  ignoreMinioDeprecation: true
  minio:
    enabled: true
    fullnameOverride: minio
    address: minio:9000

  deploymentMode: Monolithic
  singleBinary:
    replicas: 1

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0



# ----------------------------------------
# OpenTelemetry Collector sub-chart values
# ----------------------------------------
collector:
  enabled: true
  mode: daemonset
  image:
    repository: otel/opentelemetry-collector-k8s
  command:
    name: otelcol-k8s
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - operator: Exists
  extraVolumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
  extraVolumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  alternateConfig:
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    receivers:
      file_log/kedify_others:
        include:
          - /var/log/pods/keda_*/*/*.log
          - /var/log/pods/*_kedify-proxy-*_*/*/*.log
        exclude:
          - /var/log/pods/*/opentelemetry-collector/*.log
          - /var/log/pods/keda_kedify-agent-*_*/*/*.log
          - /var/log/pods/keda_keda-otel-scaler-*_*/*/*.log
        include_file_path: true
        include_file_name: false
        attributes:
          component: keda_operator
        operators:
          - type: container
            id: container-parser
      file_log/kedify_agent:
        include:
          - /var/log/pods/keda_kedify-agent-*_*/*/*.log
        include_file_path: true
        include_file_name: false
        attributes:
          component: kedify_agent
        operators:
          - type: container
            id: container-parser
          - type: regex_parser
            regex: '^(?P<time>\d{2}-\d{2} \d{2}:\d{2}:\d{2})\t[^A-Z]+(?P<sev>[A-Z0-9()-]+)[^A-Z]+\t(?P<msg>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%m-%d %H:%M:%S'
            severity:
              parse_from: attributes.sev
              overwrite_text: true
              mapping:
                fatal: FATAL
                error: ERROR
                info: INFO
                warn: WARN
                trace:
                  - DEBUG
                  - LEVEL(-1)
                  - LEVEL(-2)
                  - LEVEL(-3)
                  - LEVEL(-4)
                  - LEVEL(-5)
                  - LEVEL(-6)
                  - LEVEL(-7)
                  - LEVEL(-8)
                  - LEVEL(-9)
                  - LEVEL(-10)
      file_log/kedify_otel_scaler:
        include:
          - /var/log/pods/keda_keda-otel-scaler-*_*/*/*.log
        include_file_path: true
        include_file_name: false
        attributes:
          component: kedify_otel_scaler
        operators:
          - type: container
            id: container-parser
          - type: regex_parser
            regex: '^(?P<time>\d{2}-\d{2} \d{2}:\d{2}:\d{2})\t(?:\x1b\[[0-9;]*m)?(?P<sev>[A-Z0-9()-]+)(?:\x1b\[[0-9;]*m)?\t(?P<msg>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%m-%d %H:%M:%S'
            severity:
              parse_from: attributes.sev
              overwrite_text: true
              mapping:
                fatal: FATAL
                error: ERROR
                info: INFO
                warn: WARN
                trace:
                  - DEBUG
                  - LEVEL(-1)
                  - LEVEL(-2)
                  - LEVEL(-3)
                  - LEVEL(-4)
                  - LEVEL(-5)
                  - LEVEL(-6)
                  - LEVEL(-7)
                  - LEVEL(-8)
                  - LEVEL(-9)
                  - LEVEL(-10)

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch: {}
    exporters:
      otlphttp/loki:
        endpoint: http://loki-gateway/otlp
    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers:
            - file_log/kedify_others
            - file_log/kedify_agent
            - file_log/kedify_otel_scaler
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlphttp/loki
  ports:
    otlp:
      enabled: false
    otlp-http:
      enabled: false
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false



# ---------------------------
# Prometheus sub-chart values
# ---------------------------
prometheus:
  enabled: true
  forceNamespace: ""
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  scrapeConfigs:
    keda-http-interceptor:
      metric_relabel_configs:
      - action: keep
        regex: kedify_grpc_bridge_sessions_current|kedify_grpc_bridge_metric_flush_total|kedify_grpc_bridge_not_ready_total
        source_labels:
        - __name__
      metrics_path: /
      scrape_interval: 30s
      static_configs:
      - targets:
        - keda-add-ons-http-interceptor-metrics.keda.svc.cluster.local:2223
    keda-operator:
      metric_relabel_configs:
      - action: keep
        regex: keda_build_info|keda_resource_registered_total|keda_scaled_object_paused|keda_scaled_object_errors_total|keda_scaler_active|keda_scaler_metrics_value|keda_scaler_metrics_latency_seconds|keda_scaler_detail_errors_total|controller_runtime_reconcile_errors_total|workqueue_depth
        source_labels:
        - __name__
      metrics_path: /metrics
      scrape_interval: 30s
      static_configs:
      - targets:
        - keda-operator.keda.svc.cluster.local:8080
    kedify-agent:
      metric_relabel_configs:
      - action: keep
        regex: kedify_.*|kedify_agent_.*|controller_runtime_reconcile_errors_total|workqueue_depth
        source_labels:
        - __name__
      metrics_path: /metrics
      scrape_interval: 30s
      static_configs:
      - targets:
        - kedify-agent-metrics.keda.svc.cluster.local:8080
    keda-otel-scaler:
      metric_relabel_configs:
      - action: keep
        regex: keda_otel_scaler_.*
        source_labels:
        - __name__
      metrics_path: /metrics
      scrape_interval: 15s
      static_configs:
      - labels:
          kubernetes_namespace: keda
          release: keda-otel-scaler
        targets:
        - keda-otel-scaler.keda.svc.cluster.local:8080
    autoscaling-check-runners:
      honor_labels: true
      kubernetes_sd_configs:
      - role: endpoints
      metric_relabel_configs:
      - action: keep
        regex: kedify_autoscaling_check_.*
        source_labels:
        - __name__
      metrics_path: /metrics
      relabel_configs:
      - action: keep
        regex: autoscaling-checks
        source_labels:
        - __meta_kubernetes_service_label_app_kubernetes_io_name
      - action: keep
        regex: runner
        source_labels:
        - __meta_kubernetes_service_label_autoscaling_checks_kedify_io_role
      - action: keep
        regex: metrics
        source_labels:
        - __meta_kubernetes_endpoint_port_name
      - source_labels:
        - __meta_kubernetes_namespace
        target_label: kubernetes_namespace
      - source_labels:
        - __meta_kubernetes_service_label_app_kubernetes_io_instance
        target_label: release
      - source_labels:
        - __meta_kubernetes_service_label_autoscaling_checks_kedify_io_check
        target_label: check
      - source_labels:
        - __meta_kubernetes_service_label_autoscaling_checks_kedify_io_role
        target_label: role
      - source_labels:
        - __meta_kubernetes_service_name
        target_label: service
      scrape_interval: 15s
    autoscaling-check-targets:
      honor_labels: true
      kubernetes_sd_configs:
      - role: endpoints
      metric_relabel_configs:
      - action: keep
        regex: response_delay_seconds_(bucket|sum|count)
        source_labels:
        - __name__
      metrics_path: /metrics
      relabel_configs:
      - action: keep
        regex: autoscaling-checks
        source_labels:
        - __meta_kubernetes_service_label_app_kubernetes_io_name
      - action: keep
        regex: target
        source_labels:
        - __meta_kubernetes_service_label_autoscaling_checks_kedify_io_role
      - action: keep
        regex: http
        source_labels:
        - __meta_kubernetes_endpoint_port_name
      - source_labels:
        - __meta_kubernetes_namespace
        target_label: kubernetes_namespace
      - source_labels:
        - __meta_kubernetes_service_label_app_kubernetes_io_instance
        target_label: release
      - source_labels:
        - __meta_kubernetes_service_label_autoscaling_checks_kedify_io_check
        target_label: check
      - source_labels:
        - __meta_kubernetes_service_label_autoscaling_checks_kedify_io_role
        target_label: role
      - source_labels:
        - __meta_kubernetes_service_name
        target_label: service
      scrape_interval: 15s
    kube-state-metrics-crds:
      metric_relabel_configs:
      - action: keep
        regex: kube_keda_.*|kube_kedify_.*|kube_opentelemetry_.*|kube_deployment_(labels|status_replicas.*)|kube_daemonset_(labels|status_desired_number_scheduled|status_number_ready)|kube_statefulset_(labels|replicas|status_replicas_ready)
        source_labels:
        - __name__
      metrics_path: /metrics
      scrape_interval: 30s
      static_configs:
      - targets:
        - kube-state-metrics:8080
    kedify-predictor:
      metric_relabel_configs:
      - action: keep
        regex: rest_client_requests_total|kedify_.*|keda_internal_metricsservice_.*
        source_labels:
        - __name__
      metrics_path: /metrics
      scrape_interval: 30s
      static_configs:
      - targets:
        - kedify-predictor:8080
    kubernetes-api-servers:
      enabled: false
    kubernetes-nodes:
      enabled: false
    kubernetes-nodes-cadvisor:
      enabled: false
    kubernetes-pods:
      enabled: false
    kubernetes-pods-slow:
      enabled: false
    kubernetes-service-endpoints:
      enabled: false
    kubernetes-service-endpoints-slow:
      enabled: false
    kubernetes-services:
      enabled: false
    prometheus:
      enabled: false
    prometheus-pushgateway:
      enabled: false
  server:
    fullnameOverride: prometheus-server
    persistentVolume:
      enabled: false
    retention: 2d
  kube-state-metrics:
    enabled: true
    fullnameOverride: kube-state-metrics
    namespaceOverride: ""
    metricLabelsAllowlist:
      - deployments=[app.kubernetes.io/instance,app.kubernetes.io/name,app.kubernetes.io/component,app.kubernetes.io/managed-by,component,autoscaling-checks.kedify.io/check,autoscaling-checks.kedify.io/role]
      - daemonsets=[app.kubernetes.io/instance,app.kubernetes.io/name,app.kubernetes.io/component,app.kubernetes.io/managed-by,component]
      - statefulsets=[app.kubernetes.io/instance,app.kubernetes.io/name,app.kubernetes.io/component,app.kubernetes.io/managed-by,component]
    rbac:
      extraRules:
        - apiGroups: ["apiextensions.k8s.io"]
          resources: ["customresourcedefinitions"]
          verbs: ["list", "watch"]
        - apiGroups: ["keda.sh"]
          resources:
            - scaledjobs
            - scaledobjects
            - triggerauthentications
            - clustertriggerauthentications
          verbs: ["list", "watch"]
        - apiGroups: ["eventing.keda.sh"]
          resources:
            - cloudeventsources
            - clustercloudeventsources
          verbs: ["list", "watch"]
        - apiGroups: ["keda.kedify.io"]
          resources:
            - distributedscaledjobs
            - distributedscaledobjects
            - metricpredictors
            - podresourceautoscalers
            - podresourceprofiles
            - scalinggroups
            - scalingpolicies
          verbs: ["list", "watch"]
        - apiGroups: ["http.keda.sh"]
          resources:
            - httpscaledobjects
            - interceptorroutes
          verbs: ["list", "watch"]
        - apiGroups: ["install.kedify.io"]
          resources:
            - kedifyconfigurations
          verbs: ["list", "watch"]
        - apiGroups: ["opentelemetry.io"]
          resources:
            - opentelemetrycollectors
          verbs: ["list", "watch"]

    customResourceState:
      enabled: true
      config:
        kind: CustomResourceStateMetrics
        spec:
          resources:
            - groupVersionKind:
                group: keda.sh
                version: v1alpha1
                kind: ScaledObject
              metricNamePrefix: kube_keda_scaledobject
              labelsFromPath:
                namespace: [metadata, namespace]
                scaledobject: [metadata, name]
              metrics:
                - name: info
                  help: Information about a KEDA ScaledObject.
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        scale_target_name: [spec, scaleTargetRef, name]
                - name: created
                  help: Unix creation timestamp of the KEDA ScaledObject.
                  each:
                    type: Gauge
                    gauge:
                      path: [metadata, creationTimestamp]
                - name: spec_min_replicas
                  help: Minimum replica count configured on the KEDA ScaledObject.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [spec, minReplicaCount]
                - name: spec_max_replicas
                  help: Maximum replica count configured on the KEDA ScaledObject.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [spec, maxReplicaCount]
                - name: status_condition
                  help: KEDA ScaledObject status condition; True maps to 1 and False or Unknown maps to 0.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                      valueFrom: [status]
                - name: status_condition_info
                  help: KEDA ScaledObject status condition label state.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                        status: [status]
                - name: status_last_active_time
                  help: Unix timestamp of the last time the KEDA ScaledObject was active.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, lastActiveTime]
                - name: status_original_replica_count
                  help: Original replica count recorded by the KEDA ScaledObject.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, originalReplicaCount]
                - name: status_paused_replica_count
                  help: Paused replica count recorded by the KEDA ScaledObject.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, pausedReplicaCount]

            - groupVersionKind:
                group: keda.sh
                version: v1alpha1
                kind: ScaledJob
              metricNamePrefix: kube_keda_scaledjob
              labelsFromPath:
                namespace: [metadata, namespace]
                scaledjob: [metadata, name]
              metrics:
                - name: info
                  help: Information about a KEDA ScaledJob.
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        uid: [metadata, uid]
                - name: created
                  help: Unix creation timestamp of the KEDA ScaledJob.
                  each:
                    type: Gauge
                    gauge:
                      path: [metadata, creationTimestamp]
                - name: spec_min_replicas
                  help: Minimum replica count configured on the KEDA ScaledJob.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [spec, minReplicaCount]
                - name: spec_max_replicas
                  help: Maximum replica count configured on the KEDA ScaledJob.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [spec, maxReplicaCount]
                - name: status_condition
                  help: KEDA ScaledJob status condition; True maps to 1 and False or Unknown maps to 0.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                      valueFrom: [status]
                - name: status_condition_info
                  help: KEDA ScaledJob status condition label state.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                        status: [status]
                - name: status_last_active_time
                  help: Unix timestamp of the last time the KEDA ScaledJob was active.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, lastActiveTime]
                - name: status_paused
                  help: Whether the KEDA ScaledJob is paused.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, Paused]

            - groupVersionKind:
                group: keda.sh
                version: v1alpha1
                kind: TriggerAuthentication
              metricNamePrefix: kube_keda_triggerauthentication
              labelsFromPath:
                namespace: [metadata, namespace]
                triggerauthentication: [metadata, name]
              metrics:
                - name: info
                  help: Information about a KEDA TriggerAuthentication.
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        uid: [metadata, uid]
                - name: created
                  help: Unix creation timestamp of the KEDA TriggerAuthentication.
                  each:
                    type: Gauge
                    gauge:
                      path: [metadata, creationTimestamp]
                - name: status_scaledobjects_info
                  help: ScaledObjects using the KEDA TriggerAuthentication.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        scaledobjects: [status, scaledobjects]
                - name: status_scaledjobs_info
                  help: ScaledJobs using the KEDA TriggerAuthentication.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        scaledjobs: [status, scaledjobs]

            - groupVersionKind:
                group: keda.sh
                version: v1alpha1
                kind: ClusterTriggerAuthentication
              metricNamePrefix: kube_keda_clustertriggerauthentication
              labelsFromPath:
                clustertriggerauthentication: [metadata, name]
              metrics:
                - name: info
                  help: Information about a KEDA ClusterTriggerAuthentication.
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        uid: [metadata, uid]
                - name: created
                  help: Unix creation timestamp of the KEDA ClusterTriggerAuthentication.
                  each:
                    type: Gauge
                    gauge:
                      path: [metadata, creationTimestamp]
                - name: status_scaledobjects_info
                  help: ScaledObjects using the KEDA ClusterTriggerAuthentication.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        scaledobjects: [status, scaledobjects]
                - name: status_scaledjobs_info
                  help: ScaledJobs using the KEDA ClusterTriggerAuthentication.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        scaledjobs: [status, scaledjobs]

            - groupVersionKind:
                group: eventing.keda.sh
                version: v1alpha1
                kind: CloudEventSource
              metricNamePrefix: kube_keda_cloudeventsource
              labelsFromPath:
                namespace: [metadata, namespace]
                cloudeventsource: [metadata, name]
              metrics:
                - name: info
                  help: Information about a KEDA CloudEventSource.
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        uid: [metadata, uid]
                - name: created
                  help: Unix creation timestamp of the KEDA CloudEventSource.
                  each:
                    type: Gauge
                    gauge:
                      path: [metadata, creationTimestamp]
                - name: status_condition
                  help: KEDA CloudEventSource status condition; True maps to 1 and False or Unknown maps to 0.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                      valueFrom: [status]
                - name: status_condition_info
                  help: KEDA CloudEventSource status condition label state.
                  errorLogV: 10
                  each:
                    type: Info
                    info:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                        status: [status]

            - groupVersionKind:
                group: eventing.keda.sh
                version: v1alpha1
                kind: ClusterCloudEventSource
              metricNamePrefix: kube_keda_clustercloudeventsource
              labelsFromPath:
                clustercloudeventsource: [metadata, name]
              metrics:
                - name: info
                  help: Information about a KEDA ClusterCloudEventSource.
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        uid: [metadata, uid]
                - name: created
                  help: Unix creation timestamp of the KEDA ClusterCloudEventSource.
                  each:
                    type: Gauge
                    gauge:
                      path: [metadata, creationTimestamp]
                - name: status_condition
                  help: KEDA ClusterCloudEventSource status condition; True maps to 1 and False or Unknown maps to 0.
                  errorLogV: 10
                  each:
                    type: Gauge
                    gauge:
                      path: [status, conditions]
                      labelsFromPath:
                        condition: [type]
                      valueFrom: [status]
