image:
  repository: envoyproxy/envoy
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  adminPort: 9901
  nodeId: kedify-proxy
  kedifyEnvoyCP: keda-add-ons-http-interceptor-kedify-proxy-metric-sink
  kedifyEnvoyCPPort: 5678
  kedaNamespace: keda
  # CLUSTER_LOCAL_DOMAIN > ISTIO_CLUSTER_DOMAIN > cluster.local
  clusterDomain: cluster.local
  kedifyMetricsSinkPort: 9901


podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

deployment:
  # use either autoscaling or this
  replicas: 1
  rollingUpdate: {}
  # rollingUpdate:
  #   maxSurge: 25%
  #   maxUnavailable: 25%

service:
  enabled: true
  nameOverride: ""
  type: ClusterIP
  metricsPort: 8080
  tlsPort: 8443
  annotations: {}
  labels: {}

resources: {}

# mutually exclusive with .deployment.replicas
autoscaling:
  enabled: false
  soName: ""
  minReplicaCount: 1
  maxReplicaCount: 3
  horizontalPodAutoscalerConfig: {}
  # horizontalPodAutoscalerConfig:
  #   behavior:
  #     scaleDown:
  #       stabilizationWindowSeconds: 10
  #     scaleUp:
  #       stabilizationWindowSeconds: 10

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

topologySpreadConstraints: []

affinity: {}

priorityClassName: ""

podDisruptionBudget:
  enabled: false
  spec: {}
  # spec:
  #   # mutually exclusive with minAvailable
  #   maxUnavailable: 1
  #   # mutually exclusive with maxUnavailable
  #   minAvailable: 1
  #   unhealthyPodEvictionPolicy: IfHealthyBudget

# if anything else than 'false', the log will not print the ascii logo
noBanner: false

# -- Array of extra K8s manifests to deploy
extraObjects: []
  # - apiVersion: "cilium.io/v2"
  #   kind: CiliumNetworkPolicy
  #   metadata:
  #     name: "kedify-proxy-netpol"
  #   spec:
  #     endpointSelector:
  #       matchLabels:
  #         app: kedify-proxy
  #     egress:
  #       - toPorts:
  #         - ports:
  #           - port: "8080"
  #             protocol: TCP
