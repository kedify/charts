replicaCount: 1

image:
  repository: envoyproxy/envoy
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  adminPort: 9901
  nodeId: kedify-proxy
  kedifyEnvoyCP: keda-add-ons-http-interceptor-kedify-proxy-metric-sink
  kedifyEnvoyCPPort: 5678
  kedaNamespace: keda
  # CLUSTER_LOCAL_DOMAIN > ISTIO_CLUSTER_DOMAIN > cluster.local
  clusterDomain: cluster.local
  kedifyMetricsSinkPort: 9901


podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  enabled: true
  nameOverride: ""
  type: ClusterIP
  metricsPort: 8080
  tlsPort: 8443
  annotations: {}
  labels: {}

# ingress:
