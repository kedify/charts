resources: {}

autoscaling:
  enabled: false
  soName: ""
  minReplicaCount: 1
  maxReplicaCount: 3
  horizontalPodAutoscalerConfig: {}
  # horizontalPodAutoscalerConfig:
  #   behavior:
  #     scaleDown:
  #       stabilizationWindowSeconds: 10
  #     scaleUp:
  #       stabilizationWindowSeconds: 10

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

topologySpreadConstraints: []

affinity: {}

priorityClassName: ""

podDisruptionBudget:
  enabled: false
#   maxUnavailable:
#   minAvailable:

# if anything else than 'false', the log will not print the ascii logo
noBanner: false