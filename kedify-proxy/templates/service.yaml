{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.nameOverride | default (include "kedify-proxy.fullname" .) }}
  labels:
    {{- include "kedify-proxy.labels" . | nindent 4 }}
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.metricsPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.tlsPort }}
      targetPort: tls
      protocol: TCP
      name: tls
  selector:
    {{- include "kedify-proxy.selectorLabels" . | nindent 4 }}
{{- end }}
