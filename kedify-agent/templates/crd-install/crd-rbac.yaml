{{- if .Values.agent.createCrds }}
{{- if ne .Values.hooks "argo" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "crdInstall" . }}
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.hooks "helm" }}
  annotations:
    # create hook dependencies in the right order
    "helm.sh/hook-weight": "-4"
    {{- include "crdInstallAnnotations" . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/component: {{ include "crdInstall" . | quote }}
    role: {{ include "crdInstallSelector" . | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crdInstall" . }}
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.hooks "helm" }}
  annotations:
    # create hook dependencies in the right order
    "helm.sh/hook-weight": "-3"
    {{- include "crdInstallAnnotations" . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/component: {{ include "crdInstall" . | quote }}
    role: {{ include "crdInstallSelector" . | quote }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - delete
  - get
  - patch
  resourceNames:
  {{- range without (include "getCrdFQNames" $ | splitList "\n") "" }}
  - {{ . }}
  {{- end }}
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - list

{{- if eq .Values.hooks "jobs" }}
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  verbs:
  - delete
  resourceNames:
  - {{ include "crdInstall" . | quote }}
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - delete
  resourceNames:
  - {{ include "crdInstall" . | quote }}
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - delete
  resourceNames:
  - {{ include "crdInstall" . | quote }}
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - delete
  resourceNames:
  {{- range $path, $_ := $.Files.Glob "files/crds/**" }}
  - {{ include "crdInstall" $ }}-{{ $path | base | trimSuffix ".yaml" }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "crdInstall" . }}
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.hooks "helm" }}
  annotations:
    # create hook dependencies in the right order
    "helm.sh/hook-weight": "-2"
    {{- include "crdInstallAnnotations" . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/component: {{ include "crdInstall" . | quote }}
    role: {{ include "crdInstallSelector" . | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "crdInstall" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "crdInstall" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
