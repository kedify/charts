{{- if or .Values.agent.createCrds .Values.agent.createKedifyConfiguration }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kedify-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
---
{{- if .Values.agent.createKedifyConfiguration }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kedify-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
rules:
- apiGroups:
  - install.kedify.io
  resources:
  - kedifyconfigurations
  verbs:
  - delete
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kedify-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kedify-cleanup
subjects:
- kind: ServiceAccount
  name: kedify-cleanup
  namespace: {{ .Release.Namespace }}
---
{{- if not .Values.agent.createCrds }}
# when createCrds is disabled, the job still needs to check if the KC CRD exists
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kedify-cleanup-crd-check
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  resourceNames:
  - kedifyconfigurations.install.kedify.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kedify-cleanup-crd-check
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kedify-cleanup-crd-check
subjects:
- kind: ServiceAccount
  name: kedify-cleanup
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
---
{{- if .Values.agent.createCrds }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kedify-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - delete
  - get
  resourceNames:
  - kedifyconfigurations.install.kedify.io
  - scalingpolicies.keda.kedify.io
  - podresourceprofiles.keda.kedify.io
  - podresourceautoscalers.keda.kedify.io
  - distributedscaledobjects.keda.kedify.io
  - distributedscaledjobs.keda.kedify.io
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kedify-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kedify-cleanup
subjects:
- kind: ServiceAccount
  name: kedify-cleanup
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
