{{- if .Values.agent.createKedifyConfiguration }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: default-kedifyconfig
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: "post-install,post-upgrade"
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded"
    helm.sh/hook-weight: "-2"
data:
  content: |
    apiVersion: install.kedify.io/v1alpha1
    kind: KedifyConfiguration
    metadata:
      name: kedify
      namespace: {{ .Release.Namespace }}
    spec:
      clusterName: {{ .Values.clusterName }}
      {{- if .Values.agent.cloudAccountID }}
      cloudAccountID: "{{ .Values.agent.cloudAccountID }}"
      {{- end }}
      kedaInstallations:
      {{- if .Values.agent.features.multitenantKEDAEnabled }}
      - agentAutoUpdate: false
        name: {{ .Values.agent.multitenant.kedaInstallations.defaultTenant }}
        mode: Helm
        httpAddonHelm:
          enabled: true
          values: |-
            ---
        otelAddonHelm:
          enabled: true
          values: |-
            ---
        kedaHelm:
          enabled: true
          values: |-
            ---
        predictorAddonHelm:
          enabled: true
          values: |-
            ---
        namespace: {{ .Values.agent.multitenant.kedaInstallations.defaultTenant }}
{{ toYaml .Values.agent.kedifyConfiguration | indent 8 }}
        multitenancy:
          isDefaultTenant: true
      {{- range .Values.agent.multitenant.kedaInstallations.tenants }}
      {{- if ne .namespace $.Values.agent.multitenant.kedaInstallations.defaultTenant }}
      - name: {{ .name }}
        mode: Helm
        namespace: {{ .namespace }}
        agentAutoUpdate: false
      {{- end }} # if branch
      {{- end }} # range
      {{- else }}
      - agentAutoUpdate: false
        name: keda
        mode: Helm
        httpAddonHelm:
          enabled: true
          values: |-
            ---
        otelAddonHelm:
          enabled: true
          values: |-
            ---
        kedaHelm:
          enabled: true
          values: |-
            ---
        predictorAddonHelm:
          enabled: true
          values: |-
            ---
        namespace: {{ .Release.Namespace }}
{{ toYaml .Values.agent.kedifyConfiguration | indent 8 }}
      {{- end }}
---
{{- end }}
