{{- if .Values.agent.createKedifyConfiguration }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: default-kedifyconfig
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: "pre-install,pre-upgrade"
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded,hook-failed"
    helm.sh/hook-weight: "0"
data:
  content: |
    apiVersion: install.kedify.io/v1alpha1
    kind: KedifyConfiguration
    metadata:
      name: kedify
      namespace: {{ .Release.Namespace }}
    spec:
      clusterName: {{ .Values.clusterName }}
      {{- if .Values.agent.cloudAccountID }}
      cloudAccountID: "{{ .Values.agent.cloudAccountID }}"
      {{- end }}
      kedaInstallations:
      - agentAutoUpdate: false
        name: keda
        mode: Helm
        {{- if .Values.agent.features.multitenantKEDAEnabled }}
        multitenancy: {}
        {{- end }}
        httpAddonHelm:
          enabled: true
          values: |-
            ---
        otelAddonHelm:
          enabled: true
          values: |-
            ---
        kedaHelm:
          enabled: true
          values: |-
            ---
        predictorAddonHelm:
          enabled: true
          values: |-
            ---
        namespace: {{ .Release.Namespace }}
{{ toYaml .Values.agent.kedifyConfiguration | indent 8 }}
---
{{- end }}
