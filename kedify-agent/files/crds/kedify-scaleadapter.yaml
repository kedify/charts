---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: scaleadapters.autoscaling.kedify.io
spec:
  group: autoscaling.kedify.io
  names:
    kind: ScaleAdapter
    listKind: ScaleAdapterList
    plural: scaleadapters
    shortNames:
    - sca
    singular: scaleadapter
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Name of the scaled target resource
      jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - description: Kind of the scaled target resource
      jsonPath: .spec.targetRef.kind
      name: Kind
      type: string
    - description: Desired replicas managed by the HPA
      jsonPath: .spec.replicas
      name: Desired
      type: integer
    - description: Current replicas reported by the target
      jsonPath: .status.replicas
      name: Current
      type: integer
    - description: Ready Status
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - description: Age
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ScaleAdapter is the Schema for the scaleadapters API. It exposes a fully
          HPA-compatible /scale subresource on behalf of a target resource whose own
          /scale implementation is incomplete (e.g. missing status.selector, as is the
          case for Agones Fleets) and forwards desired replica changes to the target.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScaleAdapterSpec defines the desired state of ScaleAdapter
            properties:
              podSelector:
                description: |-
                  PodSelector selects the Pods that belong to the target workload. It is
                  serialized into status.selector, which the HPA requires to be non-empty.
                  The matching labels must be present on the Pods of the target workload
                  (for Agones Fleets, add them to the Pod template at
                  spec.template.spec.template.metadata.labels).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              replicas:
                description: |-
                  Replicas is the desired replica count forwarded to the target's /scale
                  subresource. It is initialized by the controller from the target's
                  current desired replicas and afterwards managed by the HPA (or KEDA for
                  scale to/from zero) through this adapter's /scale subresource. Leave it
                  unset when creating the adapter.
                format: int32
                minimum: 0
                type: integer
              targetRef:
                description: |-
                  TargetRef references the resource whose /scale subresource desired
                  replicas are managed through this adapter.
                properties:
                  apiVersion:
                    description: APIVersion of the target resource, e.g. "agones.dev/v1".
                    minLength: 1
                    type: string
                  kind:
                    description: Kind of the target resource, e.g. "Fleet".
                    minLength: 1
                    type: string
                  name:
                    description: Name of the target resource.
                    minLength: 1
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
            required:
            - podSelector
            - targetRef
            type: object
          status:
            description: ScaleAdapterStatus defines the observed state of ScaleAdapter
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              replicas:
                description: |-
                  Replicas mirrors the current replica count reported by the target's
                  /scale subresource.
                format: int32
                type: integer
              selector:
                description: |-
                  Selector is the serialized form of spec.podSelector, exposed through
                  this adapter's /scale subresource for the HPA.
                type: string
              targetDesiredReplicas:
                description: |-
                  TargetDesiredReplicas is the desired replica count last observed on
                  (or written to) the target's /scale subresource. It is used to detect
                  competing replica writers and for troubleshooting.
                format: int32
                type: integer
            required:
            - replicas
            type: object
        type: object
    served: true
    storage: true
    subresources:
      scale:
        labelSelectorPath: .status.selector
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
      status: {}
