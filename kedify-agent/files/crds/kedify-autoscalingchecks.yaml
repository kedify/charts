        description: AutoscalingCheck is the Schema for autoscaling health checks.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AutoscalingCheckSpec defines periodic autoscaling health
              checks for one namespace.
            properties:
              canary:
                description: Canary controls Kedify-owned resources created in this
                  namespace.
                properties:
                  cleanupPolicy:
                    default: RetainBetweenRuns
                    description: CleanupPolicy controls canary retention.
                    enum:
                    - DeleteAfterRun
                    - RetainBetweenRuns
                    - DeleteOnCheckDeletion
                    type: string
                  image:
