                    format: int64
                    type: integer
                  duration:
                    description: Duration is the total validation duration.
                    type: string
                  finishedAt:
                    description: FinishedAt is when the run completed.
                    format: date-time
                    type: string
                  message:
                    description: Message summarizes the last run result.
                    type: string
                  missed:
                    description: Missed marks a compact entry representing missed
                      scheduled runs.
                    type: boolean
                  reason:
                    description: Reason is a bounded reason for the last run result.
                    type: string
                  scaleDownLatency:
                    description: ScaleDownLatency is observed when replicas return
                      to the idle target.
                    type: string
                  scaleUpLatency:
                    description: ScaleUpLatency is observed when ready replicas become
                      available.
                    type: string
                  scheduledAt:
                    description: ScheduledAt is the scheduled time represented by
                      this status entry.
                    format: date-time
                    type: string
                  startedAt:
                    description: StartedAt is when the run began.
                    format: date-time
                    type: string
                  status:
                    description: Status is Success, Failure, or Skipped.
                    type: string
                type: object
              nextRunTime:
                description: NextRunTime is when the controller intends to run again.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the last generation processed by
                  the controller.
                format: int64
                type: integer
              reliability:
                description: Reliability summarizes successful and failed runs across
                  configured windows.
                items:
                  description: AutoscalingCheckReliabilityWindowStatus summarizes
                    reliability for one window.
                  properties:
                    complete:
                      description: Complete indicates whether retained status history
