                      type: boolean
                    countedRuns:
                      description: CountedRuns is the number of runs included in the
                        reliability denominator.
                      format: int64
                      type: integer
                    expectedRuns:
                      description: ExpectedRuns is the number of non-suspended scheduled
                        runs observed in the window.
                      format: int64
                      type: integer
                    failedRuns:
                      description: FailedRuns is the number of failed runs included
                        in the reliability denominator.
                      format: int64
                      type: integer
                    missedRuns:
                      description: MissedRuns is the number of scheduled runs missed
                        in the window.
                      format: int64
                      type: integer
                    retainedSince:
                      description: RetainedSince is the oldest retained run timestamp
                        used for this summary.
                      format: date-time
                      type: string
                    successfulRuns:
                      description: SuccessfulRuns is the number of successful runs
                        included in the window.
                      format: int64
                      type: integer
                    window:
                      description: Window is the duration covered by this summary.
                      type: string
                  required:
                  - window
                  type: object
                maxItems: 8
                type: array
              runHistory:
                description: RunHistory stores a bounded recent run history used for
                  reliability calculations.
                items:
                  description: AutoscalingCheckRunStatus describes one validation
                    run.
                  properties:
                    count:
                      description: Count is the number of runs represented by this
                        entry. Empty means one run.
                      format: int64
                      type: integer
                    duration:
                      description: Duration is the total validation duration.
                      type: string
                    finishedAt:
                      description: FinishedAt is when the run completed.
                      format: date-time
                      type: string
                    message:
                      description: Message summarizes the last run result.
                      type: string
                    missed:
                      description: Missed marks a compact entry representing missed
                        scheduled runs.
                      type: boolean
                    reason:
                      description: Reason is a bounded reason for the last run result.
                      type: string
                    scaleDownLatency:
                      description: ScaleDownLatency is observed when replicas return
                        to the idle target.
                      type: string
                    scaleUpLatency:
                      description: ScaleUpLatency is observed when ready replicas
                        become available.
                      type: string
                    scheduledAt:
                      description: ScheduledAt is the scheduled time represented by
                        this status entry.
                      format: date-time
                      type: string
                    startedAt:
                      description: StartedAt is when the run began.
                      format: date-time
                      type: string
                    status:
                      description: Status is Success, Failure, or Skipped.
                      type: string
                  type: object
                maxItems: 200
                type: array
