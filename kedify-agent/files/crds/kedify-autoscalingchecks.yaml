---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: autoscalingchecks.keda.kedify.io
spec:
  group: keda.kedify.io
  names:
    kind: AutoscalingCheck
    listKind: AutoscalingCheckList
    plural: autoscalingchecks
    shortNames:
    - asc
    singular: autoscalingcheck
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Overall autoscaling health
