                    default: 30s
                    description: Timeout bounds individual component checks.
                    type: string
                type: object
              expectations:
                description: Expectations defines success timing thresholds.
                properties:
                  activateWithin:
                    default: 90s
                    description: ActivateWithin bounds KEDA activation.
                    type: string
                  readyReplicasWithin:
                    default: 120s
                    description: ReadyReplicasWithin bounds canary pod readiness.
                    type: string
                  scaleDownToZeroWithin:
                    default: 7m
                    description: ScaleDownToZeroWithin bounds scale-down observation.
