                    type: string
                  routeMode:
                    default: InClusterService
                    description: RouteMode selects the HTTP canary routing strategy.
                    enum:
                    - InClusterService
                    type: string
                  scaling:
                    description: Scaling controls the HTTP add-on scaler target.
                    properties:
                      granularity:
                        default: 1s
                        description: Granularity configures request-rate sampling.
