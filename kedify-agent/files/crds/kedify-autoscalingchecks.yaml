      type: string
    - description: Validator type
      jsonPath: .spec.type
      name: Type
      type: string
    - description: Next scheduled run
      jsonPath: .status.nextRunTime
      name: Next Run
      type: date
    - description: Age
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
