                properties:
                  countMissedRunsAsFailures:
                    default: true
                    description: CountMissedRunsAsFailures controls whether missed
                      scheduled runs reduce reliability.
                    type: boolean
                  windows:
                    default:
                    - 1h
                    - 24h
                    - 168h
                    - 720h
                    description: |-
                      Windows controls the bounded duration windows reported in status and metrics.
