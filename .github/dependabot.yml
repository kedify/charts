version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  labels:
  - enhancement
  - dependency-management
  groups:
    all-updates:
      patterns:
        - "*"
- package-ecosystem: docker
  # tracks the envoy version pin in kedify-proxy/Dockerfile (kedify-only entry,
  # keep on rebases from kedacore/charts)
  directory: "/kedify-proxy"
  schedule:
    interval: weekly
  labels:
  - dependency-management
