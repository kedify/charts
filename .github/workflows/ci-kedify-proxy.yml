name: Helm Chart CI (kedify-proxy)
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-kedify-proxy.yml"
      - "kedify-proxy/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-kedify-proxy.yml"
      - "kedify-proxy/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-helm-3-x:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint 'kedify-proxy' Helm chart
        run: helm lint kedify-proxy

      # kedify-agent installs this chart with empty values (plus config.kedaNamespace
      # when KEDA runs in a non-default namespace), so these renders are the contract
      # the agent relies on
      - name: Template with agent-default values
        run: |
          helm template kedify-proxy ./kedify-proxy --namespace demo > /dev/null
          helm template kedify-proxy ./kedify-proxy --namespace demo --set config.kedaNamespace=other-ns > /dev/null

      - name: Template with example values
        run: helm template kedify-proxy ./kedify-proxy --namespace demo -f kedify-proxy/examples/test-values.yaml > /dev/null

  validate-envoy-bootstrap:
    name: Validate bootstrap config with pinned Envoy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Extract rendered Envoy bootstrap
        run: |
          helm template kedify-proxy ./kedify-proxy --namespace demo | \
            yq 'select(.kind == "Deployment") | .spec.template.spec.containers[0].env[] | select(.name == "ENVOY_CONFIG") | .value' > envoy-bootstrap.yaml
          test -s envoy-bootstrap.yaml
          cat envoy-bootstrap.yaml

      # runs the exact Envoy version the chart ships (appVersion) in validate mode,
      # so an Envoy bump that drops or changes bootstrap config fields fails here
      - name: Validate bootstrap with Envoy from appVersion
        run: |
          APP_VERSION=$(yq '.appVersion' kedify-proxy/Chart.yaml)
          if [[ -z "${APP_VERSION}" || "${APP_VERSION}" == "null" ]]; then
            echo "::error::could not read appVersion from kedify-proxy/Chart.yaml"
            exit 1
          fi
          echo "Validating bootstrap against envoyproxy/envoy:${APP_VERSION}"
          docker run --rm -v "${PWD}:/config" "envoyproxy/envoy:${APP_VERSION}" --mode validate -c /config/envoy-bootstrap.yaml

  smoke-xds-e2e:
    name: xDS smoke test with interceptor on Kind
    needs: lint-helm-3-x
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f

      - name: Create KEDA namespace
        run: kubectl create ns keda

      - name: Install KEDA chart
        run: |
          cat <<EOF > keda-values.yaml
          image:
            keda:
              tag: kedify-main
            metricsApiServer:
              tag: kedify-main
            webhooks:
              tag: kedify-main
          EOF
          helm install keda ./keda/ --namespace keda --values keda-values.yaml --wait --timeout 5m

      - name: Install HTTP add-on chart (interceptor = Envoy control plane)
        run: |
          cat <<EOF > http-add-on-values.yaml
          # chart defaults point at the upstream ghcr.io/kedacore images, which have
          # no kedify-main tag; the kedify forks live under ghcr.io/kedify
          images:
            tag: kedify-main
            operator: ghcr.io/kedify/http-add-on-operator
            interceptor: ghcr.io/kedify/http-add-on-interceptor
            scaler: ghcr.io/kedify/http-add-on-scaler
          interceptor:
            replicas:
              min: 1
          EOF
          helm install http-add-on ./http-add-on/ --namespace keda --values http-add-on-values.yaml --wait --timeout 5m

      - name: Install kedify-proxy chart with agent-default values
        run: helm install kedify-proxy ./kedify-proxy/ --namespace demo --create-namespace --wait --timeout 5m

      - name: Verify xDS connection between kedify-proxy and interceptor
        run: |
          kubectl -n demo port-forward svc/kedify-proxy-admin 9901:9901 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          for N in {1..20}; do
            STATE=$(curl -s localhost:9901/stats | awk '/^control_plane.connected_state:/{print $2}')
            echo "control_plane.connected_state: ${STATE:-<no response>}"
            if [[ "$STATE" == "1" ]]; then
              exit 0
            fi
            sleep 3
          done
          echo "::error::kedify-proxy never established the xDS connection to the interceptor"
          exit 1

      - name: Deploy test app with HTTPScaledObject
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: demo-app
            namespace: demo
            labels:
              app: demo-app
          spec:
            replicas: 0
            selector:
              matchLabels:
                app: demo-app
            template:
              metadata:
                labels:
                  app: demo-app
              spec:
                containers:
                  - name: demo-app
                    image: registry.k8s.io/e2e-test-images/agnhost:2.45
                    args:
                      - netexec
                    ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                    readinessProbe:
                      httpGet:
                        path: /
                        port: http
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: demo-app
            namespace: demo
          spec:
            ports:
              - port: 8080
                targetPort: http
                protocol: TCP
                name: http
            selector:
              app: demo-app
          ---
          apiVersion: http.keda.sh/v1alpha1
          kind: HTTPScaledObject
          metadata:
            name: demo-app
            namespace: demo
          spec:
            hosts:
              - demo.test
            targetPendingRequests: 100
            scaledownPeriod: 10
            scaleTargetRef:
              name: demo-app
              service: demo-app
              port: 8080
            replicas:
              min: 0
              max: 2
          EOF

      - name: Verify interceptor pushes app config over xDS
        run: |
          kubectl -n demo port-forward svc/kedify-proxy-admin 9902:9901 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          for N in {1..20}; do
            LDS=$(curl -s localhost:9902/stats | awk '/^listener_manager.lds.update_success:/{print $2}')
            CDS=$(curl -s localhost:9902/stats | awk '/^cluster_manager.cds.update_success:/{print $2}')
            echo "lds.update_success: ${LDS:-0}, cds.update_success: ${CDS:-0}"
            if [[ "${LDS:-0}" -ge 1 && "${CDS:-0}" -ge 1 ]] && curl -s localhost:9902/config_dump | grep -q demo-app; then
              echo "demo-app config delivered over xDS"
              exit 0
            fi
            sleep 3
          done
          echo "::error::interceptor never delivered demo-app config to kedify-proxy over xDS"
          curl -s localhost:9902/config_dump || true
          exit 1

      - name: Verify traffic through kedify-proxy scales app from zero
        run: |
          kubectl -n demo port-forward svc/kedify-proxy 8080:8080 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          for N in {1..10}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 -H "Host: demo.test" http://localhost:8080/ || true)
            echo "HTTP ${CODE}"
            if [[ "$CODE" == "200" ]]; then
              break
            fi
            sleep 5
          done
          if [[ "$CODE" != "200" ]]; then
            echo "::error::request through kedify-proxy never returned 200"
            exit 1
          fi
          REPLICAS=$(kubectl -n demo get deploy demo-app -o jsonpath='{.status.replicas}')
          echo "demo-app replicas after traffic: ${REPLICAS:-0}"
          if [[ "${REPLICAS:-0}" -lt 1 ]]; then
            echo "::error::demo-app did not scale from zero"
            exit 1
          fi

      - name: Show diagnostics
        if: always()
        run: |
          kubectl get pods -A || true
          kubectl get httpscaledobjects -A || true
          kubectl get so -A || true
          echo "--- kedify-proxy logs ---"
          kubectl -n demo logs deploy/kedify-proxy --tail=100 || true
          echo "--- interceptor logs ---"
          kubectl -n keda logs deploy/keda-add-ons-http-interceptor --tail=100 || true
