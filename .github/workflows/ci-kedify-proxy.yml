name: Helm Chart CI (kedify-proxy)
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-kedify-proxy.yml"
      - "kedify-proxy/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-kedify-proxy.yml"
      - "kedify-proxy/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-helm-3-x:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint 'kedify-proxy' Helm chart
        run: helm lint kedify-proxy

      # kedify-agent installs this chart with empty values (plus config.kedaNamespace
      # when KEDA runs in a non-default namespace), so these renders are the contract
      # the agent relies on
      - name: Template with agent-default values
        run: |
          helm template kedify-proxy ./kedify-proxy --namespace demo > /dev/null
          helm template kedify-proxy ./kedify-proxy --namespace demo --set config.kedaNamespace=other-ns > /dev/null

      - name: Template with example values
        run: helm template kedify-proxy ./kedify-proxy --namespace demo -f kedify-proxy/examples/test-values.yaml > /dev/null

  validate-envoy-bootstrap:
    name: Validate bootstrap config with pinned Envoy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Extract rendered Envoy bootstrap
        run: |
          helm template kedify-proxy ./kedify-proxy --namespace demo | \
            yq 'select(.kind == "Deployment") | .spec.template.spec.containers[0].env[] | select(.name == "ENVOY_CONFIG") | .value' > envoy-bootstrap.yaml
          test -s envoy-bootstrap.yaml
          cat envoy-bootstrap.yaml

      # runs the exact Envoy version the chart ships (appVersion) in validate mode,
      # so an Envoy bump that drops or changes bootstrap config fields fails here
      - name: Validate bootstrap with Envoy from appVersion
        run: |
          APP_VERSION=$(yq '.appVersion' kedify-proxy/Chart.yaml)
          if [[ -z "${APP_VERSION}" || "${APP_VERSION}" == "null" ]]; then
            echo "::error::could not read appVersion from kedify-proxy/Chart.yaml"
            exit 1
          fi
          echo "Validating bootstrap against envoyproxy/envoy:${APP_VERSION}"
          docker run --rm -v "${PWD}:/config" "envoyproxy/envoy:${APP_VERSION}" --mode validate -c /config/envoy-bootstrap.yaml

  smoke-xds-e2e:
    name: xDS smoke test with interceptor on Kind
    needs: lint-helm-3-x
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f

      - name: Create KEDA namespace
        run: kubectl create ns keda

      # The xDS control plane only exists in the kedify interceptor fork, and released
      # kedify charts pin image tags that match their binaries. The in-repo charts track
      # the upstream rebase and default to upstream kedacore images (no xDS), so the
      # latest released kedify charts are the right counterpart for this smoke test.
      - name: Install released kedify KEDA chart
        run: |
          helm repo add kedifykeda https://kedify.github.io/charts
          helm repo update kedifykeda
          KEDA_VERSION=$(helm search repo kedifykeda/keda --versions --devel -o json | jq -r '[.[] | select(.name == "kedifykeda/keda")][0].version')
          if [[ -z "${KEDA_VERSION}" || "${KEDA_VERSION}" == "null" ]]; then
            echo "::error::could not resolve latest kedifykeda/keda chart version"
            exit 1
          fi
          echo "installing keda ${KEDA_VERSION}"
          helm install keda kedifykeda/keda --version "${KEDA_VERSION}" --namespace keda --wait --timeout 5m

      - name: Install released kedify HTTP add-on chart (interceptor = Envoy control plane)
        run: |
          HTTP_ADD_ON_VERSION=$(helm search repo kedifykeda/keda-add-ons-http --versions --devel -o json | jq -r '.[0].version')
          if [[ -z "${HTTP_ADD_ON_VERSION}" || "${HTTP_ADD_ON_VERSION}" == "null" ]]; then
            echo "::error::could not resolve latest kedifykeda/keda-add-ons-http chart version"
            exit 1
          fi
          echo "installing keda-add-ons-http ${HTTP_ADD_ON_VERSION}"
          cat <<EOF > http-add-on-values.yaml
          interceptor:
            replicas:
              min: 1
          EOF
          helm install http-add-on kedifykeda/keda-add-ons-http --version "${HTTP_ADD_ON_VERSION}" --namespace keda --values http-add-on-values.yaml --wait --timeout 5m

      # the app and HTTPScaledObject exist before the proxy is installed, mirroring how
      # kedify-agent deploys kedify-proxy into namespaces that already have HSOs; without
      # any HSO the interceptor has no xDS snapshot to push and envoy sits in initial-fetch
      # timeouts long enough for the chart's default liveness probe to kill it
      - name: Deploy test app with HTTPScaledObject
        run: |
          kubectl create ns demo
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: demo-app
            namespace: demo
            labels:
              app: demo-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: demo-app
            template:
              metadata:
                labels:
                  app: demo-app
              spec:
                containers:
                  - name: demo-app
                    image: registry.k8s.io/e2e-test-images/agnhost:2.45
                    args:
                      - netexec
                    ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                    readinessProbe:
                      httpGet:
                        path: /
                        port: http
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: demo-app
            namespace: demo
          spec:
            ports:
              - port: 8080
                targetPort: http
                protocol: TCP
                name: http
            selector:
              app: demo-app
          ---
          apiVersion: http.keda.sh/v1alpha1
          kind: HTTPScaledObject
          metadata:
            name: demo-app
            namespace: demo
          spec:
            hosts:
              - demo.test
            targetPendingRequests: 100
            scaledownPeriod: 10
            scaleTargetRef:
              name: demo-app
              service: demo-app
              port: 8080
            replicas:
              min: 1
              max: 2
          EOF

      - name: Install kedify-proxy chart with agent-default values
        run: helm install kedify-proxy ./kedify-proxy/ --namespace demo --wait --timeout 5m

      - name: Verify xDS connection between kedify-proxy and interceptor
        run: |
          kubectl -n demo port-forward svc/kedify-proxy-admin 9901:9901 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          for N in {1..20}; do
            STATE=$(curl -s localhost:9901/stats | awk '/^control_plane.connected_state:/{print $2}')
            echo "control_plane.connected_state: ${STATE:-<no response>}"
            if [[ "$STATE" == "1" ]]; then
              exit 0
            fi
            sleep 3
          done
          echo "::error::kedify-proxy never established the xDS connection to the interceptor"
          exit 1

      - name: Verify interceptor pushes app config over xDS
        run: |
          kubectl -n demo port-forward svc/kedify-proxy-admin 9902:9901 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          for N in {1..20}; do
            LDS=$(curl -s localhost:9902/stats | awk '/^listener_manager.lds.update_success:/{print $2}')
            CDS=$(curl -s localhost:9902/stats | awk '/^cluster_manager.cds.update_success:/{print $2}')
            echo "lds.update_success: ${LDS:-0}, cds.update_success: ${CDS:-0}"
            if [[ "${LDS:-0}" -ge 1 && "${CDS:-0}" -ge 1 ]] && curl -s localhost:9902/config_dump | grep -q demo-app; then
              echo "demo-app config delivered over xDS"
              exit 0
            fi
            sleep 3
          done
          echo "::error::interceptor never delivered demo-app config to kedify-proxy over xDS"
          curl -s localhost:9902/config_dump || true
          exit 1

      # the app runs warm (min 1): scale-from-zero requires kedify-agent (it converts
      # HTTPScaledObjects into ScaledObjects), which needs Kedify service credentials
      # and is out of scope for chart CI
      - name: Verify traffic through kedify-proxy reaches the app
        run: |
          kubectl -n demo rollout status deploy/demo-app --timeout 2m
          kubectl -n demo port-forward svc/kedify-proxy 8080:8080 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          for N in {1..10}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 -H "Host: demo.test" http://localhost:8080/ || true)
            echo "HTTP ${CODE}"
            if [[ "$CODE" == "200" ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::request through kedify-proxy never returned 200"
          exit 1

      - name: Show diagnostics
        if: always()
        run: |
          kubectl get pods -A || true
          kubectl get httpscaledobjects -A || true
          kubectl get so -A || true
          echo "--- events (keda) ---"
          kubectl -n keda get events --sort-by=.lastTimestamp | tail -30 || true
          echo "--- events (demo) ---"
          kubectl -n demo get events --sort-by=.lastTimestamp | tail -30 || true
          echo "--- demo pod descriptions ---"
          kubectl -n demo describe pods | grep -E "^Name:|Image:|State:|Reason:|Exit Code:|Message:" || true
          echo "--- kedify-proxy logs ---"
          kubectl -n demo logs deploy/kedify-proxy --tail=100 || true
          echo "--- interceptor logs ---"
          kubectl -n keda logs deploy/keda-add-ons-http-interceptor --tail=100 || true
          echo "--- interceptor previous logs ---"
          kubectl -n keda logs deploy/keda-add-ons-http-interceptor --previous --tail=50 || true
          echo "--- keda pod descriptions ---"
          kubectl -n keda describe pods | grep -E "^Name:|Image:|State:|Reason:|Exit Code:|Message:" || true
