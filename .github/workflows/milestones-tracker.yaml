name: milestones tracking with release

on:
  workflow_call:
    inputs:
      chart:
        description: 'chart name'
        type: string
        required: true
      prNumber:
        description: 'pull request number'
        type: string
        required: true
    secrets:
      PAT_TOKEN:
        description: 'PAT for gh CLI operations requiring elevated permissions'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

jobs:
  milestone_tracker:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.milestone_tracking.outputs.should_release }}
      version: ${{ steps.milestone_tracking.outputs.version }}
      merge_commit_sha: ${{ steps.merge_commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Get merge commit SHA
        id: merge_commit
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.prNumber }}
        run: |
          set -euo pipefail
          sha=$(gh pr view -R kedify/charts "${PR_NUMBER}" --json 'mergeCommit' --jq '.mergeCommit.oid')
          if [[ -z "$sha" || "$sha" == "null" ]]; then
              echo "Failed to resolve merge commit SHA for PR #${PR_NUMBER}" >&2
              exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Ensure correct milestone
        id: milestone_tracking
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.prNumber }}
        run: |
          set -euo pipefail

          has_milestone=$(gh pr view -R kedify/charts ${PR_NUMBER} --json 'milestone' --jq '.milestone.title | length')
          if [[ "$has_milestone" == 0 ]]; then
              echo "setting '${{ inputs.chart }}/next' milestone for PR #${PR_NUMBER}"
              gh pr edit -R kedify/charts ${PR_NUMBER} --milestone "${{ inputs.chart }}/next"
              exit 0
          fi
          labels=( $(gh pr view -R kedify/charts ${PR_NUMBER} --json 'labels' --jq '.labels[].name') )
          for label in "${labels[@]}"; do
              if [[ "$label" == "release/${{ inputs.chart }}" ]]; then
                  has_release_label="true"
              fi
          done

          if [[ "$has_release_label" != "true" ]]; then
              echo "not a release PR #${PR_NUMBER}, labels: ${labels[*]}"
              exit 0
          fi
          milestone=$(gh pr view -R kedify/charts ${PR_NUMBER} --json 'milestone' --jq '.milestone.title')
          echo "release PR #${PR_NUMBER} with milestone: $milestone"
          next_milestone_prs=( $(gh pr list -R kedify/charts --search "milestone:${{ inputs.chart }}/next" --state merged --json number --jq '.[].number') )
          for pr in "${next_milestone_prs[@]}"; do
              echo "moving PR $pr milestone '${{ inputs.chart }}/next' => '$milestone'"
              gh pr edit -R kedify/charts "$pr" --milestone "$milestone"
          done
          release_tag=${milestone#*/}
          pr_body="$(gh pr view $PR_NUMBER --json 'body' --jq '.body')"

          if gh release view $milestone > /dev/null; then
              echo "release $milestone already exists"
          else
              echo "creating release $milestone"
              gh release create -R kedify/charts "$milestone" --latest --title "${{ inputs.chart }}: $release_tag" --notes "${pr_body}" --target "${{ steps.merge_commit.outputs.sha }}"
          fi
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "version=$release_tag" >> $GITHUB_OUTPUT
  release:
    needs: milestone_tracker
    if: needs.milestone_tracker.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.milestone_tracker.outputs.merge_commit_sha }}
      - name: Publish ${{ inputs.chart }} Helm Chart
        uses: wozniakjan/helm-gh-pages@single_chart_path
        if: "${{ needs.milestone_tracker.outputs.should_release == 'true' }}"
        with:
          token: ${{ github.token }}
          linting: "off"
          dependencies: "kedify,https://kedify.github.io/charts"
          charts_dir: "."
          single_chart_path: "./${{ inputs.chart }}/"
      - name: Publish OCI ${{ inputs.chart }} Helm Chart
        if: "${{ needs.milestone_tracker.outputs.should_release == 'true' && inputs.chart == 'kedify-proxy' }}"
        uses: appany/helm-oci-chart-releaser@v0.3.0
        with:
          name: ${{ inputs.chart }}
          repository: kedify/charts
          tag: ${{ needs.milestone_tracker.outputs.version }}
          path: ${{ inputs.chart }}
          registry: ghcr.io
          registry_username: kedify
          registry_password: ${{ secrets.GITHUB_TOKEN }}

  post_release:
    needs: [milestone_tracker, release]
    if: needs.milestone_tracker.outputs.should_release == 'true' && inputs.chart == 'kedify-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PAT token presence for kedify-agent post-release
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PAT_TOKEN:-}" ]]; then
            echo "PAT_TOKEN secret is required for kedify-agent post_release (asset upload + operator release trigger)." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.milestone_tracker.outputs.merge_commit_sha }}
      - name: Generate air-gapped image digests JSON
        env:
          VERSION: ${{ needs.milestone_tracker.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ./artifacts
          CHART_DIR="$PWD/kedify-agent" "$PWD/scripts/print-image-names.sh" > ./artifacts/air-gapped-images.txt
          "$PWD/scripts/update-generated-images-json.sh" \
            "./artifacts/generated-images.json" \
            "./artifacts/air-gapped-images.txt" \
            "$VERSION" \
            "$(date -u +%F)"
          cat ./artifacts/generated-images.json
      - name: Upload image digest asset to existing GitHub release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          CHART: ${{ inputs.chart }}
          VERSION: ${{ needs.milestone_tracker.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "$CHART/$VERSION" ./artifacts/generated-images.json --repo kedify/charts --clobber
      - name: Trigger Openshift Operator release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          VERSION: ${{ needs.milestone_tracker.outputs.version }}
        run: |
          set -euo pipefail
          operator_input_version="${VERSION#v}"
          gh workflow run release.yaml \
            --repo kedify/kedify-agent-helm-operator \
            -f version="${operator_input_version}"
      - name: Trigger EKS Addon release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          VERSION: ${{ needs.milestone_tracker.outputs.version }}
        run: |
          set -euo pipefail
          operator_input_version="${VERSION#v}"
          gh workflow run release.yaml \
