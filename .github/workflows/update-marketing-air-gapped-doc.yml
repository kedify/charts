name: Update Marketing Air-Gapped Doc

on:
  workflow_call:
    inputs:
      chart_version:
        required: true
        type: string
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  update-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout charts repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: charts

      - name: Checkout marketing repo
        uses: actions/checkout@v4
        with:
          repository: kedify/marketing
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          path: marketing

      - name: Build images list from released kedify-agent chart
        run: |
          set -euo pipefail
          mkdir -p work

          helm repo add kedify https://kedify.github.io/charts
          helm repo update
          helm pull kedify/kedify-agent --version "${{ inputs.chart_version }}" --untar --untardir work

          CHART_DIR="$PWD/work/kedify-agent" "$PWD/charts/scripts/print-image-names.sh" > "$PWD/work/air-gapped-images.txt"

          echo "Generated image list:"
          cat "$PWD/work/air-gapped-images.txt"

      - name: Update generated images JSON
        run: |
          set -euo pipefail
          "$PWD/charts/scripts/update-generated-images-json.sh" \
            "$PWD/marketing/packages/docs/src/content/generated-images.json" \
            "$PWD/work/air-gapped-images.txt" \
            "${{ inputs.chart_version }}" \
            "$(date -u +%F)"

      - name: Create pull request in marketing repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          path: marketing
          branch: automation/update-air-gapped-images-${{ inputs.chart_version }}
          base: main
          delete-branch: true
          commit-message: "docs(air-gapped): update generated images for kedify-agent ${{ inputs.chart_version }}"
          title: "docs(air-gapped): update generated images for kedify-agent ${{ inputs.chart_version }}"
          body: |
            Automated update of generated image digests used by the air-gapped installation page.

            Source chart:
            - `kedify/kedify-agent@${{ inputs.chart_version }}`

            Generated by:
            - `.github/workflows/update-marketing-air-gapped-doc.yml` in `kedify/charts`
          add-paths: |
            packages/docs/src/content/generated-images.json
