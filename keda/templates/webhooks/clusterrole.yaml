{{- if and .Values.rbac.create .Values.webhooks.enabled (ne .Values.kedify.multitenant.mode "tenant") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ (include "keda.operator.name" .) }}-webhook
    {{- include "keda.labels" . | indent 4 }}
  name: {{ (include "keda.operator.name" .) }}-webhook
rules:
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - list
  - watch
{{- if .Values.kedify.kpa.enabled }}
- apiGroups:
  - autoscaling.kedify.io
  resources:
  - kedifypodautoscalers
  verbs:
  - get
  - list
  - watch
{{- end }}
- apiGroups:
  - keda.sh
  resources:
  - scaledobjects
  verbs:
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - limitranges
  verbs:
  - list
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
{{- end -}}
