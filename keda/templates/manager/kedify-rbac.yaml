{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: "kedify-{{ (include "keda.operator.name" .) }}-scalinggroups-admin"
    {{- include "keda.labels" . | indent 4 }}
  name: kedify-{{ (include "keda.operator.name" .) }}-scalinggroups-admin
rules:
- apiGroups: ["keda.kedify.io"]
  resources: ["scalinggroups", "scalinggroups/status"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: "kedify-{{ (include "keda.operator.name" .) }}-http-admin"
    {{- include "keda.labels" . | indent 4 }}
  name: kedify-{{ (include "keda.operator.name" .) }}-http-admin
rules:
- apiGroups: ["http.keda.sh"]
  resources: ["httpscaledobjects"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
{{- if not .Values.watchNamespace }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: kedify-{{ (include "keda.operator.name" .) }}-scalinggroups-admin
    {{- include "keda.labels" . | indent 4 }}
  name: "kedify-{{ (include "keda.operator.name" .) }}-scalinggroups-admin"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "kedify-{{ (include "keda.operator.name" .) }}-scalinggroups-admin"
subjects:
- kind: ServiceAccount
  name: {{ include "keda.operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: kedify-{{ (include "keda.operator.name" .) }}-http-admin
    {{- include "keda.labels" . | indent 4 }}
  name: "kedify-{{ (include "keda.operator.name" .) }}-http-admin"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "kedify-{{ (include "keda.operator.name" .) }}-http-admin"
subjects:
- kind: ServiceAccount
  name: {{ include "keda.operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- else }}
  {{- range ( split "," .Values.watchNamespace ) }}
# Role binding for namespace '{{ . }}'
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  {{- with $.Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: "kedify-{{ (include "keda.operator.name" $) }}-scalinggroups-admin"
    {{- include "keda.labels" $ | indent 4 }}
  name: "kedify-{{ (include "keda.operator.name" $) }}-scalinggroups-admin"
  namespace: {{ . | trim }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "kedify-{{ (include "keda.operator.name" $) }}-scalinggroups-admin"
subjects:
- kind: ServiceAccount
  name: {{ include "keda.operator.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  {{- with $.Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: "kedify-{{ (include "keda.operator.name" $) }}-http-admin"
    {{- include "keda.labels" $ | indent 4 }}
  name: "kedify-{{ (include "keda.operator.name" $) }}-http-admin"
  namespace: {{ . | trim }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "kedify-{{ (include "keda.operator.name" $) }}-http-admin"
subjects:
- kind: ServiceAccount
  name: {{ include "keda.operator.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
---
  {{- end }}
{{- end }}
{{- end }}
