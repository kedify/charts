{{- if .Values.rbac.create }}
{{- if not .Values.watchNamespace }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ (include "keda.operator.name" .) }}
    {{- include "keda.labels" . | indent 4 }}
  name: {{ (include "keda.operator.name" .) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ (include "keda.operator.name" .) }}
subjects:
- kind: ServiceAccount
  name: {{ include "keda.operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- else }}
  {{- $namespaces := uniq (append (splitList "," .Values.watchNamespace) .Release.Namespace) -}}
  {{- range $namespaces }}
---
# Role binding for namespace '{{ . }}'
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  {{- with $.Values.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ (include "keda.operator.name" $) }}
    {{- include "keda.labels" $ | indent 4 }}
  name: {{ (include "keda.operator.name" $) }}
  namespace: {{ . | trim }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ (include "keda.operator.name" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "keda.operator.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
---
  {{- end }}
{{- end }}
{{- end }}
