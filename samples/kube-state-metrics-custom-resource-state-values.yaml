# Values for prometheus-community/kube-state-metrics.
#
# Usage:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install kube-state-metrics prometheus-community/kube-state-metrics \
#     --namespace monitoring --create-namespace \
#     -f samples/kube-state-metrics-custom-resource-state-values.yaml
#
# For kube-prometheus-stack, put this file under the `kube-state-metrics:` values key.
#
# CRDs covered from this repository:
# - keda/templates/crds
# - http-add-on/templates/crds
# - kedify-agent/files/crds

rbac:
  extraRules:
    - apiGroups: ["apiextensions.k8s.io"]
      resources: ["customresourcedefinitions"]
      verbs: ["list", "watch"]
    - apiGroups: ["keda.sh"]
      resources:
        - scaledjobs
        - scaledobjects
        - triggerauthentications
        - clustertriggerauthentications
      verbs: ["list", "watch"]
    - apiGroups: ["eventing.keda.sh"]
      resources:
        - cloudeventsources
        - clustercloudeventsources
      verbs: ["list", "watch"]
    - apiGroups: ["keda.kedify.io"]
      resources:
        - distributedscaledjobs
        - distributedscaledobjects
        - podresourceautoscalers
        - podresourceprofiles
        - scalinggroups
        - scalingpolicies
      verbs: ["list", "watch"]
    - apiGroups: ["http.keda.sh"]
      resources:
        - httpscaledobjects
        - interceptorroutes
      verbs: ["list", "watch"]
    - apiGroups: ["install.kedify.io"]
      resources:
        - kedifyconfigurations
      verbs: ["list", "watch"]

customResourceState:
  enabled: true
  config:
    kind: CustomResourceStateMetrics
    spec:
      resources:
        - groupVersionKind:
            group: keda.sh
            version: v1alpha1
            kind: ScaledObject
          metricNamePrefix: kube_keda_scaledobject
          labelsFromPath:
            namespace: [metadata, namespace]
            scaledobject: [metadata, name]
          metrics:
            - name: info
              help: Information about a KEDA ScaledObject.
              each:
                type: Info
                info:
                  labelsFromPath:
                    scale_target_name: [spec, scaleTargetRef, name]
            - name: created
              help: Unix creation timestamp of the KEDA ScaledObject.
              each:
                type: Gauge
                gauge:
                  path: [metadata, creationTimestamp]
            - name: spec_min_replicas
              help: Minimum replica count configured on the KEDA ScaledObject.
              errorLogV: 10
              each:
                type: Gauge
                gauge:
                  path: [spec, minReplicaCount]
            - name: spec_max_replicas
              help: Maximum replica count configured on the KEDA ScaledObject.
              errorLogV: 10
              each:
                type: Gauge
                gauge:
                  path: [spec, maxReplicaCount]
            - name: status_condition
              help: KEDA ScaledObject status condition; True maps to 1 and False or Unknown maps to 0.
              errorLogV: 10
              each:
                type: Gauge
                gauge:
                  path: [status, conditions]
                  labelsFromPath:
                    condition: [type]
                  valueFrom: [status]
            - name: status_condition_info
              help: KEDA ScaledObject status condition label state.
              errorLogV: 10
              each:
                type: Info
                info:
                  path: [status, conditions]
                  labelsFromPath:
                    condition: [type]
                    status: [status]
            - name: status_last_active_time
              help: Unix timestamp of the last time the KEDA ScaledObject was active.
              errorLogV: 10
              each:
                type: Gauge
                gauge:
                  path: [status, lastActiveTime]
            - name: status_original_replica_count
              help: Original replica count recorded by the KEDA ScaledObject.
              errorLogV: 10
              each:
                type: Gauge
                gauge:
                  path: [status, originalReplicaCount]
            - name: status_paused_replica_count
              help: Paused replica count recorded by the KEDA ScaledObject.
              errorLogV: 10
              each:
                type: Gauge
                gauge:
                  path: [status, pausedReplicaCount]

